<VirtualHost *:80>
    ServerName localhost

    <Location "/api">

        RewriteEngine on
        #RewriteCond %{LA-U:REMOTE_USER} (.*)
        #RewriteRule .* - [E=X_REMOTE_USER:%1]

        #RequestHeader set X-REMOTE-USER 'M.RIAM'

        # Specify a custom error document for authentication failures
        ErrorDocument 401 /page401.html

        ProxyPass "http://localhost:3000"
        ProxyPassReverse "http://localhost:3000"
    </Location>

    # Static files directory (optional)
    DocumentRoot /var/www/html
    <Directory "/var/www/html">
        AllowOverride None
        Require all granted
    </Directory>
</VirtualHost>
