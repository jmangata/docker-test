version: "3.8"

services:
  backend:
    build: .
    container_name: node_backend
    ports:
      - "80:80"
      - "3000:3000"
    #volumes:
      #- ./backend:/app
      #- /app/node_modules
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /usr/src/app
        - action: rebuild
          path: ./backend/package.json
        - action: rebuild
          path: ./backend/package-lock.json
        - action: rebuild
          path: ./vhost.conf

  postgis:
    image: postgis/postgis:latest
    environment:
      POSTGRES_DB: annuaire_ctm
      POSTGRES_PASSWORD: madinina972
      POSTGRES_USER: postgres
      
    volumes:
      - postgis_data_annuaire:/var/lib/postgresql/data
volumes:
  postgis_data_annuaire:

